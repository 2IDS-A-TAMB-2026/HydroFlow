<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Planta - Gestão Online</title>
    <link rel="stylesheet" href="style_dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-droplet"></i> <span class="logos">HYDRO</span>FLOW
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Procurar opção do menu...">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Painel</a></li>
                <li><a href="agendamento.html"><i class="fa-solid fa-calendar-days"></i> Agendamentos</a></li>
                <li class="active"><a href="cadastro_planta.html"><i class="fa-solid fa-seedling"></i> Cadastro de Plantas</a></li>
                <li><a href="plantas.html"><i class="fa-solid fa-tree"></i> Plantas</a></li>
                <li><a href="historico.html"><i class="fas fa-history"></i> Histórico</a></li>
                <li><a href="cadastro_equipamento.html"><i class="fa-solid fa-cart-shopping"></i>Cadastro de Equipamento</a></li>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div class="nav-left">
                    <button class="menu-btn"><i class="fa-solid fa-bars"></i></button>
                    <h2>Cadastro de Culturas e Plantas</h2>
                </div>
                <div class="nav-right">
                    <span>Manual Sistema Gestão Online</span>
                    <i class="fa-solid fa-user"></i>
                    <i class="fa-solid fa-bell"></i>
                </div>
            </header>

            <div class="widget form-widget full-width-form">
                <div class="form-header-flex">
                    <h3 class="form-title">
                        <i class="fa-solid fa-leaf" style="color: #00a65a;"></i> Nova Planta
                    </h3>
                    <button class="btn-voltar"><i class="fa-solid fa-list"></i> Ver Cadastradas</button>
                </div>
                <hr class="divider">
                
                <form id="formPlanta">
                    
                    <h4 class="section-title">Informações da Espécie</h4>
                    
                    <div class="form-row">
                        <div class="form-group" style="flex: 2;">
                            <label for="nomePlanta">Nome da Planta</label>
                            <input type="text" id="nomePlanta" class="form-control" placeholder="Ex: Tomate Carmem, Alface Crespa..." required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="tipoPlanta">Tipo da Planta</label>
                            <select id="tipoPlanta" class="form-control" required>
                                <option value="">Selecione...</option>
                                <option value="hortalica">Hortaliça</option>
                                <option value="frutifera">Frutífera</option>
                                <option value="legume">Legume</option>
                                <option value="grao">Grão / Cereal</option>
                                <option value="ornamental">Ornamental</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex: 1.5;">
                            <label for="cultura">Cultura</label>
                            <input type="text" id="cultura" class="form-control" placeholder="Ex: Solanáceas, Hortifruti..." required>
                        </div>
                    </div>

                    <h4 class="section-title" style="margin-top: 15px;">Parâmetros de Irrigação</h4>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="qtdAgua">Quantidade de Água Necessária</label>
                            <div style="display: flex; gap: 10px;">
                                <input type="number" id="qtdAgua" class="form-control" step="0.1" placeholder="Ex: 5" required>
                                <select class="form-control" style="width: 120px;" required>
                                    <option value="litros_dia">Litros/dia</option>
                                    <option value="mm_dia">mm/dia</option>
                                    <option value="ml_dia">mL/dia</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="duracao">Dispositivo responsável</label>
                            <select id="disp" class="form-control">
                                <option value="">Selecione o Dispositivo...</option>
                                <option value="disp1">Irriga 1000</option>
                                <option value="disp1">Hortas irrigadas 03012</option>
                                <option value="disp1">Irrigation daora</option>
                                <option value="disp1">Irrigator bonito</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="periodicidade">Periodicidade (Tempo entre irrigações)</label>
                            <div style="display: flex; gap: 10px;">
                                <input type="number" id="periodicidade" class="form-control" min="1" placeholder="Ex: 12" required>
                                <select class="form-control" style="width: 120px;" required>
                                    <option value="horas">Horas</option>
                                    <option value="dias">Dias</option>
                                    <option value="semanas">Semanas</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <hr class="divider">

                    <div class="form-actions">
                        <button type="button" class="btn-cancelar">Limpar</button>
                        <button type="submit" class="btn-submit" style="width: auto; padding: 12px 30px; margin-top: 0;">
                            <i class="fa-solid fa-seedling"></i> Salvar Planta
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

</body>
</html>
